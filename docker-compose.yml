version: '3.8'

services:
  # PostgreSQL Database
  db:
    image: postgres:14-alpine
    container_name: rwandair_db
    restart: always
    environment:
      POSTGRES_DB: rwandair_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    networks:
      - rwandair_network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Backend API
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: rwandair_backend
    restart: always
    ports:
      - "5000:5000"
    environment:
      PORT: 5000
      NODE_ENV: production
      DB_HOST: db
      DB_PORT: 5432
      DB_NAME: rwandair_db
      DB_USER: postgres
      DB_PASSWORD: postgres
      JWT_SECRET: rwandair_jwt_secret_2024
      JWT_EXPIRES_IN: 7d
      STRIPE_SECRET_KEY: sk_test_your_key
      CLIENT_URL: http://localhost:3000
    depends_on:
      db:
        condition: service_healthy
    networks:
      - rwandair_network

  # Frontend
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: rwandair_frontend
    restart: always
    ports:
      - "3000:80"
    depends_on:
      - backend
    networks:
      - rwandair_network

networks:
  rwandair_network:
    driver: bridge

volumes:
  pgdata:
    driver: local
